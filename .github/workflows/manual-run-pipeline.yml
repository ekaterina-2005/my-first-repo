name: Manual Test Run

on:
  workflow_dispatch: # Этот триггер позволяет запускать пайплайн вручную
    inputs:
      test_type:
        description: 'Type of tests to run'
        type: choice
        options:
          - ui
          - api
          - all
        required: true
        default: 'all'

jobs:
  run-tests:
    timeout-minutes: 60 # Автоматическая остановка при зависании через 60 минут
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci # Строгая установка по package-lock.json

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run UI tests
        if: ${{ github.event.inputs.test_type == 'ui' || github.event.inputs.test_type == 'all' }}
        run: npm run tests:ui -- --reporter=html
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-ui

      - name: Run API tests
        if: ${{ github.event.inputs.test_type == 'api' || github.event.inputs.test_type == 'all' }}
        run: npm run tests:api -- --reporter=html
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-api

      - name: Upload UI test report
        if: ${{ always() && (github.event.inputs.test_type == 'ui' || github.event.inputs.test_type == 'all') }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ui
          path: playwright-report-ui/ 
          retention-days: 7

      - name: Upload API test report
        if: ${{ always() && (github.event.inputs.test_type == 'api' || github.event.inputs.test_type == 'all') }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: playwright-report-api/ 
          retention-days: 7
